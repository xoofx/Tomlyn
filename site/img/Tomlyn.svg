<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tomlyn</title>
  <desc id="desc">A stylized letter T shaped like Thor's hammer with a bright yellow lightning bolt, on a dark plate with green-to-blue accents.</desc>
  <defs>
    <style>
      :root {
        --tl-bg-0: #0B1628;
        --tl-bg-1: #0A0E1A;
        --tl-outline: #FFFFFF;
        --tl-outline-opacity: 0.14;
        --tl-shadow: #000000;
        --tl-shadow-opacity: 0.40;

        --tl-accent-0: #10B981;
        --tl-accent-1: #06B6D4;
        --tl-accent-2: #3B82F6;
        --tl-accentb-0: #6EE7B7;
        --tl-accentb-1: #67E8F9;
        --tl-accentb-2: #93C5FD;

        --tl-bolt-0: #FEF9C3;
        --tl-bolt-1: #FDE047;
        --tl-bolt-2: #EAB308;
        --tl-bolt-glow: #FACC15;

        --tl-plate-stroke-opacity: 0.55;
        --tl-plate-ring-opacity: 0.60;
        --tl-shine-0-opacity: 0.18;
        --tl-shine-1-opacity: 0.06;
      }
    </style>

    <!-- Background plate gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--tl-bg-0)"/>
      <stop offset="1" stop-color="var(--tl-bg-1)"/>
    </linearGradient>

    <!-- Soft top-left shine overlay -->
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(190 110) rotate(54) scale(350 270)">
      <stop offset="0" stop-color="var(--tl-outline)" stop-opacity="var(--tl-shine-0-opacity)"/>
      <stop offset="0.55" stop-color="var(--tl-outline)" stop-opacity="var(--tl-shine-1-opacity)"/>
      <stop offset="1" stop-color="var(--tl-outline)" stop-opacity="0"/>
    </radialGradient>

    <!-- Green-to-blue accent gradient -->
    <linearGradient id="accent" x1="92" y1="60" x2="420" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--tl-accent-0)"/>
      <stop offset="0.50" stop-color="var(--tl-accent-1)"/>
      <stop offset="1" stop-color="var(--tl-accent-2)"/>
    </linearGradient>

    <!-- Brighter accent for the outer ring -->
    <linearGradient id="accentBright" x1="92" y1="50" x2="420" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--tl-accentb-0)"/>
      <stop offset="0.50" stop-color="var(--tl-accentb-1)"/>
      <stop offset="1" stop-color="var(--tl-accentb-2)"/>
    </linearGradient>

    <!-- Thunder-yellow bolt gradient -->
    <linearGradient id="bolt" x1="290" y1="50" x2="270" y2="462" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--tl-bolt-0)"/>
      <stop offset="0.4" stop-color="var(--tl-bolt-1)"/>
      <stop offset="1" stop-color="var(--tl-bolt-2)"/>
    </linearGradient>

    <!-- Drop shadow for the foreground glyph group -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="var(--tl-shadow)" flood-opacity="var(--tl-shadow-opacity)"/>
    </filter>

    <!-- Two-layer glow: wide soft outer + tight bright inner -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="outerGlow"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="innerGlow"/>
      <feMerge>
        <feMergeNode in="outerGlow"/>
        <feMergeNode in="innerGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background plate -->
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#shine)"/>

  <!-- Plate strokes -->
  <rect x="7" y="7" width="498" height="498" rx="121" fill="none" stroke="url(#accent)" stroke-opacity="var(--tl-plate-stroke-opacity)" stroke-width="14"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#accentBright)" stroke-opacity="var(--tl-plate-ring-opacity)" stroke-width="4"/>

  <!-- Foreground glyphs -->
  <g filter="url(#shadow)">

    <!--
      Thor's Hammer T (Mjolnir silhouette)
      Wide blocky head = T crossbar, sturdy handle, leather-wrapped grip at base.
    -->
    <path d="
      M 105,74
      L 407,74
      C 415,74 420,79 420,87
      L 420,178
      C 420,186 415,191 407,191
      L 292,191
      L 292,378
      L 304,378
      C 310,378 314,382 314,388
      L 314,434
      C 314,440 310,444 304,444
      L 208,444
      C 202,444 198,440 198,434
      L 198,388
      C 198,382 202,378 208,378
      L 220,378
      L 220,191
      L 105,191
      C 97,191 92,186 92,178
      L 92,87
      C 92,79 97,74 105,74
      Z
    " fill="url(#accent)"/>

    <!-- White edge highlight on the hammer -->
    <path d="
      M 105,74
      L 407,74
      C 415,74 420,79 420,87
      L 420,178
      C 420,186 415,191 407,191
      L 292,191
      L 292,378
      L 304,378
      C 310,378 314,382 314,388
      L 314,434
      C 314,440 310,444 304,444
      L 208,444
      C 202,444 198,440 198,434
      L 198,388
      C 198,382 202,378 208,378
      L 220,378
      L 220,191
      L 105,191
      C 97,191 92,186 92,178
      L 92,87
      C 92,79 97,74 105,74
      Z
    " fill="none" stroke="var(--tl-outline)" stroke-opacity="var(--tl-outline-opacity)" stroke-width="3"/>

    <!-- Subtle inner border on the hammer head for a forged look -->
    <rect x="108" y="90" width="296" height="84" rx="4" fill="none" stroke="var(--tl-outline)" stroke-opacity="0.08" stroke-width="2"/>

    <!-- Lightning bolt striking through the hammer -->
    <g filter="url(#glow)">
      <polygon points="
        306,48
        256,226
        332,208
        248,462
        300,248
        228,270
      " fill="url(#bolt)" stroke="var(--tl-bolt-glow)" stroke-width="4" stroke-linejoin="round"/>
    </g>

  </g>
</svg>

